name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      APP_HOST: 127.0.0.1
      DATABASE_URL: sqlite:///./data/ci.db
      MOCK_MODE: "true"
      LLM_MODE: mock
      DRAFT_PROVIDER: mock
      CRITIC_PROVIDER: mock
      FINAL_PROVIDER: mock
      HEYGEN_MODE: disabled
      PUBLISH_ENABLED: "false"
      AUTO_PUBLISH: "false"
      STORE_LLM_PAYLOADS: "false"

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install locked dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.lock

      - name: Validate installed dependency graph
        run: python -m pip check

      - name: Audit runtime dependency lock
        run: python -m pip_audit -r requirements.lock

      - name: Ruff
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: mypy
        run: python -m mypy app

      - name: pytest
        run: python -m pytest

      - name: Build standalone wheel
        run: python -m build --wheel --no-isolation --outdir dist/wheel-smoke

      - name: Smoke-test installed wheel resources
        run: python scripts/wheel_smoke.py

      - name: Build clean source release
        run: python scripts/build_release.py

      - name: Alembic upgrade, downgrade, upgrade
        shell: bash
        run: |
          rm -f data/ci.db
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: CLI doctor
        run: python -m app.cli doctor

      - name: CLI help
        run: python -m app.cli --help

      - name: Ensure no production write configuration
        shell: bash
        run: |
          test "$AUTO_PUBLISH" = "false"
          test "$PUBLISH_ENABLED" = "false"

  docker-smoke:
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Smoke-test the Docker default command
        run: python scripts/docker_smoke.py
